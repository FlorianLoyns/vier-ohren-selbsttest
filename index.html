  <style>
    :root{
      --bg:#ffffff; --fg:#000000; --muted:#f7f7f7;
      --accent:#007bff; --accent-hover:#0056b3;
      --warn:#ffefef; --border:#000000;
      --note:#fffef0; --note-border:#e7d27c;
      --quiet:#f0f7ff; --quiet-border:#b3d4fc;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      background:var(--bg); color:var(--fg);
      padding:20px; max-width:800px; margin:0 auto; line-height:1.55;
      position: relative;
    }
    h1{ margin:0 0 8px 0; }
    .muted{ opacity:.8; }
    .small{ font-size:14px; }
    .progress-wrap{ margin:16px 0 8px; }
    .progress-text{ font-size:14px; opacity:.85; margin-bottom:4px; }
    progress{ width:100%; height:10px; }
    .card{
      border:1px solid var(--border); border-radius:10px; padding:16px; background:var(--muted);
    }
    .situation{ font-weight:600; margin-bottom:12px; outline:none; }
    .option{
      background:#fff; border:1px solid #ddd; border-radius:10px;
      padding:12px; margin:8px 0; cursor:pointer; display:flex; gap:10px; align-items:flex-start;
      transition:border-color .2s ease, box-shadow .2s ease;
    }
    .option:hover{ border-color:var(--accent); box-shadow:0 1px 0 rgba(0,0,0,.04); }
    .option input{ margin-top:3px; }
    .controls{ display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; }
    button{
      padding:12px 16px; font-size:16px; cursor:pointer; border:none; border-radius:8px;
      background:var(--accent); color:#fff; transition:background .2s ease;
    }
    button:hover{ background:var(--accent-hover);}
    button.secondary{ background:#e0e0e0; color:#000; }
    .unbeantwortet{ background-color:var(--warn); border:1px solid #f59a9a; }
    .ergebnis{
      display:none; margin-top:24px; padding:16px; border:1px solid var(--border); border-radius:10px; background:#fff;
    }
    .badges{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .badge{ border:1px solid #ddd; border-radius:999px; padding:6px 10px; font-size:12px; background:#fafafa; }
    .note-box{
      background:var(--note); border:1px solid var(--note-border);
      border-radius:10px; padding:14px; margin:16px 0;
    }
    .quiet-box{
      background:var(--quiet); border:1px solid var(--quiet-border);
      border-radius:10px; padding:14px; margin:16px 0;
    }
    .note-box h3, .quiet-box h3{ margin:0 0 6px 0; font-size:15px; }

    /* QR Floating Action Button */
    .qr-fab{
      position: fixed; top: 20px; right: 20px;
      background: #111; color:#fff;
      border-radius: 999px; padding:10px 12px;
      font-weight:600; font-size:14px; letter-spacing:.3px;
      border:1px solid rgba(0,0,0,.2); box-shadow:0 6px 20px rgba(0,0,0,.15);
      cursor:pointer; display:flex; align-items:center; gap:8px; z-index:1000;
    }
    .qr-fab:hover{ transform: translateY(-1px); }
    .qr-fab .dot{ width:6px; height:6px; background:#0ea5e9; border-radius:50%; }
    .qr-modal-backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,.5);
      display:none; align-items:center; justify-content:center; z-index:1001;
    }
    .qr-modal{
      background:#fff; border-radius:16px; padding:20px;
      width:min(92vw, 420px); border:1px solid #e5e7eb;
      box-shadow:0 20px 60px rgba(0,0,0,.2);
    }
    .qr-modal header{
      display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
    }
    .qr-modal h3{ margin:0; font-size:18px; }
    .qr-close{ background:transparent; border:none; font-size:20px; cursor:pointer; }
    .qr-canvas-wrap{
      display:flex; justify-content:center; align-items:center; padding:10px; background:#fff;
      border:1px solid #eee; border-radius:12px; margin:8px 0 6px;
    }

    footer{ margin-top:40px; padding-top:12px; border-top:1px solid #eee; font-size:13px; opacity:.6; text-align:center; }
    footer a{ color:inherit; }

    @media (max-width:600px){
      body{ padding:12px; }
      button{ width:100%; }
      .controls{ gap:8px; }
      .qr-fab{ display:none; }
    }
  </style>
</head>
<body>

<button class="qr-fab" id="qrFab" aria-haspopup="dialog" aria-controls="qrDialog" title="QR-Code öffnen">
  <span class="dot" aria-hidden="true"></span> QR öffnen
</button>

<div class="qr-modal-backdrop" id="qrBackdrop" role="dialog" aria-modal="true" aria-labelledby="qrTitle">
  <div class="qr-modal" id="qrDialog">
    <header>
      <h3 id="qrTitle">Seite schnell öffnen</h3>
      <button class="qr-close" id="qrClose" aria-label="Schließen">×</button>
    </header>
    <div class="qr-canvas-wrap">
      <div id="qrCanvas" aria-label="QR-Code dieser Seite"></div>
    </div>
  </div>
</div>

<h1>Selbsttest: Mit welchem „Ohr" hörst du?</h1>
<p class="muted small">
  Dieser Selbsttest hilft dir, dein spontanes „Hören" nach dem 4-Ohren-Modell von Schulz von Thun zu reflektieren.
</p>

<div class="progress-wrap" aria-live="polite">
  <div class="progress-text" id="progressText">Frage 1 von 12</div>
  <progress id="progressBar" max="12" value="1"></progress>
</div>

<div class="card" id="frageCard">
  <div class="situation" id="situationText" tabindex="-1"></div>
  <form id="formAntworten" role="radiogroup" aria-labelledby="situationText"></form>
</div>

<div class="controls">
  <button class="secondary" id="btnZurueck" type="button">Zurück</button>
  <button id="btnWeiter" type="button">Weiter</button>
  <button id="btnAuswerten" type="button" style="display:none;">Auswerten</button>
</div>

<div class="ergebnis" id="ergebnisBox"></div>

  for(let i=array.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [array[i],array[j]] = [array[j],array[i]];
  }
  return array;
}

      { text: "Die Vitalwerte sollen vollständig dokumentiert werden.", ohr: "Sachohr" },
      { text: "Er wirkt angespannt; die Doku ist ihm sehr wichtig.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll die Vitalwerte ab jetzt direkt nach jeder Messung dokumentieren.", ohr: "Appellohr" }
    ]
  },
  // 6 Patientin im Zimmer
  {
    situation: "Du betrittst das Zimmer einer älteren Patientin, die dich schon erwartet. Als sie dich sieht, lächelt sie erleichtert: „Schön, dass du da bist.\"",
    optionen: [
      { text: "Sie mag mich; das fühlt sich wertschätzend an.", ohr: "Beziehungsohr" },
      { text: "Sie nimmt meine Anwesenheit wahr – ich bin da.", ohr: "Sachohr" },
      { text: "Sie war wohl einsam und ist jetzt erleichtert.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll mir ein paar Minuten Zeit für sie nehmen.", ohr: "Appellohr" }
    ]
  },
  // 7 Pause/Peers
  {
    situation: "In der Pause schaut eine Mitschülerin in dein Berichtsheft, grinst und sagt halb im Scherz, halb ernst: „Du hast aber viel im Berichtsheft stehen.\"",
    optionen: [
      { text: "Sie ist neidisch oder lästert – das sticht.", ohr: "Beziehungsohr" },
      { text: "Ich habe tatsächlich viele Einträge.", ohr: "Sachohr" },
      { text: "Sie vergleicht sich und ist unsicher.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll ihr anbieten, ihr zu zeigen, wie ich dokumentiere.", ohr: "Appellohr" }
    ]
  },
  // 8 Pflegekraft/Anweisung
  {
    situation: "Nach einer Behandlung ruft dir eine erfahrene Pflegefachkraft über den Flur zu: „Den Verbandswagen musst du nachher noch auffüllen.\"",
    optionen: [
      { text: "Sie hält mich für nachlässig – schon wieder so etwas.", ohr: "Beziehungsohr" },
      { text: "Der Wagen ist leer und muss aufgefüllt werden.", ohr: "Sachohr" },
      { text: "Sie ist genervt, weil das oft liegenbleibt.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll den Verbandswagen nachher auffüllen.", ohr: "Appellohr" }
    ]
  },
  // 9 Dozentin (formell)
  {
    situation: "Am Ende der Stunde geht die Dozentin die Liste durch. Sie schaut zu dir, runzelt leicht die Stirn und sagt nüchtern: „Sie haben die Hausaufgabe nicht abgegeben.\"",
    optionen: [
      { text: "Sie hält mich für unzuverlässig – unangenehm.", ohr: "Beziehungsohr" },
      { text: "Ich habe die Hausaufgabe nicht abgegeben.", ohr: "Sachohr" },
      { text: "Sie ist enttäuscht oder genervt – das spürt man.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll die Hausaufgabe zeitnah nachreichen.", ohr: "Appellohr" }
    ]
  },
  // 10 Patient beim Waschen
  {
    situation: "Du hilfst einem Patienten morgens bei der Körperpflege. Während du mit dem Waschlappen beginnst, verzieht er das Gesicht und sagt etwas ungeduldig: „Das Wasser ist aber ziemlich kalt.\"",
    optionen: [
      { text: "Er hält mich für unaufmerksam – das fühlt sich wie Kritik an.", ohr: "Beziehungsohr" },
      { text: "Die Wassertemperatur passt nicht.", ohr: "Sachohr" },
      { text: "Ihm ist unbehaglich, vielleicht friert er.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll das Wasser wärmer machen.", ohr: "Appellohr" }
    ]
  },
  // 11 Feedbackgespräch
  {
    situation: "Nach deinem zweiten Praxistag nimmt sich die Praxisanleiterin kurz Zeit für ein Feedback. Sie lächelt und sagt: „Heute hast du selbstständiger gearbeitet als gestern.\"",
    optionen: [
      { text: "Heißt das, gestern war ich nicht gut genug?", ohr: "Beziehungsohr" },
      { text: "Ich habe heute mehr Aufgaben allein übernommen.", ohr: "Sachohr" },
      { text: "Sie freut sich über meine Entwicklung – das tut gut.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll dieses Niveau morgen halten.", ohr: "Appellohr" }
    ]
  },
  // 12 Stationsküche
  {
    situation: "Du bringst Tabletts zurück in die Stationsküche. Eine Fachkraft spricht dich an, während sie Bestellungen einsortiert: „Denk bitte daran, die Essensbestellungen rechtzeitig abzugeben.\"",
    optionen: [
      { text: "Sie denkt wohl, dass ich oft etwas vergesse.", ohr: "Beziehungsohr" },
      { text: "Für die Bestellungen gibt es eine Frist.", ohr: "Sachohr" },
      { text: "Sie sorgt sich, weil sonst Chaos entsteht.", ohr: "Selbstoffenbarungsohr" },
      { text: "Ich soll die Bestellungen rechtzeitig abgeben.", ohr: "Appellohr" }
    ]
  }
]);

// Zustand
let index = 0;
const selections = new Array(fragen.length).fill(null);
const votes = { "Sachohr":0, "Beziehungsohr":0, "Selbstoffenbarungsohr":0, "Appellohr":0 };

const progressText = document.getElementById("progressText");
const progressBar  = document.getElementById("progressBar");
const cardEl       = document.getElementById("frageCard");
const formEl       = document.getElementById("formAntworten");
const situationEl  = document.getElementById("situationText");
const btnBack      = document.getElementById("btnZurueck");
const btnNext      = document.getElementById("btnWeiter");
const btnFinish    = document.getElementById("btnAuswerten");
const resultEl     = document.getElementById("ergebnisBox");

progressBar.max = fragen.length;

// pro Frage die gemischte Antwort-Reihenfolge zwischenspeichern
fragen.forEach(f => f._shuffled = null);

function render(){
  progressText.textContent = `Frage ${index + 1} von ${fragen.length}`;
  progressBar.value = index + 1;

  const f = fragen[index];
  situationEl.textContent = f.situation;

  if(!f._shuffled){
    f._shuffled = shuffle([...f.optionen]);
  }
  const options = f._shuffled;

  formEl.innerHTML = "";
  cardEl.classList.remove("unbeantwortet");

  options.forEach((opt, i) => {
    const id = `opt_${index}_${i}`;
    const label = document.createElement("label");
    label.className = "option";
    label.htmlFor = id;

    const input = document.createElement("input");
    input.type = "radio";
    input.name = `frage_${index}`;
    input.id = id;
    input.value = i;

    if(selections[index] === i){
      input.checked = true;
    }

    const text = document.createElement("div");
    text.textContent = opt.text;

    label.appendChild(input);
    label.appendChild(text);
    formEl.appendChild(label);
  });

  btnBack.style.display   = index === 0 ? "none" : "inline-block";
  btnNext.style.display   = index < fragen.length - 1 ? "inline-block" : "none";
  btnFinish.style.display = index === fragen.length - 1 ? "inline-block" : "none";

  // Fokus auf erste Option
  const firstInput = formEl.querySelector('input[type="radio"]');
  if(firstInput) firstInput.focus();
}

function currentSelectedIndex(){
  const checked = formEl.querySelector('input[type="radio"]:checked');
  if(!checked) return null;
  return parseInt(checked.value,10);
}

btnNext.addEventListener("click", () => {
  const selIdx = currentSelectedIndex();
  if(selIdx === null){
    cardEl.classList.add("unbeantwortet");
    return;
  }
  cardEl.classList.remove("unbeantwortet");
  selections[index] = selIdx;
  index++;
  render();
});

// Bugfix: aktuelle Auswahl beim Zurück-Klick speichern
btnBack.addEventListener("click", () => {
  const selIdx = currentSelectedIndex();
  if(selIdx !== null) selections[index] = selIdx;
  if(index > 0) index--;
  render();
});

btnFinish.addEventListener("click", () => {
  const selIdx = currentSelectedIndex();
  if(selIdx === null){
    cardEl.classList.add("unbeantwortet");
    return;
  }
  cardEl.classList.remove("unbeantwortet");
  selections[index] = selIdx;

  // Zählen
  Object.keys(votes).forEach(k => votes[k]=0);
  for(let q=0; q<fragen.length; q++){
    const chosenIdx = selections[q];
    const opt = fragen[q]._shuffled[chosenIdx];
    votes[opt.ohr]++;
  }

  const total = selections.length;
  const perc = n => Math.round((n/total)*100);

  // Mischtyp: dominante Ohren (±1 zum Maximum)
  const maxVal = Math.max(...Object.values(votes));
  const dominantOhren = Object.keys(votes).filter(k => votes[k] >= maxVal - 1);
  // Stilles Ohr (±1 zum Minimum)
  const minVal = Math.min(...Object.values(votes));
  const stilleOhren = Object.keys(votes).filter(k => votes[k] <= minVal + 1 && votes[k] < maxVal);

  const impulse = {
    "Sachohr": "Du achtest stark auf Fakten und Inhalte. In der Pflege hilft das bei präziser Dokumentation und klaren Übergaben. Achte darauf, dass du Beziehungssignale und unausgesprochene Bedürfnisse nicht überhörst – besonders bei verunsicherten Patient:innen oder gestressten Kolleg:innen.",
    "Beziehungsohr": "Du bist sensibel für Umgangston und Wertschätzung. Das macht dich aufmerksam im zwischenmenschlichen Bereich. Aber: Wenn dich etwas trifft, prüfe kurz, ob es wirklich um dich geht – oft sagt das Gegenüber mehr über sich selbst als über dich. Rückfragen hilft mehr als Grübeln.",
    "Selbstoffenbarungsohr": "Du nimmst Stimmungen und Bedürfnisse gut wahr – eine echte Stärke in der Pflege. Achte zusätzlich auf die Sachebene: Was ist konkret zu tun, zu dokumentieren, zu entscheiden? Sonst kann das Gespür für andere dazu führen, dass Aufgaben liegenbleiben.",
    "Appellohr": "Du hörst schnell heraus, was zu tun ist, und handelst. Das macht dich verlässlich. Aber: Mach einen kurzen Check vor dem Loslegen. Wollte das Gegenüber wirklich eine Handlung – oder war es nur ein Lagebericht, ein Gefühl, ein Hinweis? Nicht jede Aussage ist ein Auftrag."
  };

  const stilleImpulse = {
    "Sachohr": "Du ignorierst häufig die Sachebene. Versuche bei wichtigen Aussagen zuerst ganz nüchtern zu fragen: Was ist hier der reine Inhalt? Was wird konkret gesagt?",
    "Beziehungsohr": "Du achtest wenig auf die Beziehungsebene. Das kann entspannen, aber auch dazu führen, dass du zwischenmenschliche Spannungen spät bemerkst. Frag dich gelegentlich: Wie steht mein Gegenüber zu mir in diesem Moment?",
    "Selbstoffenbarungsohr": "Das Selbstoffenbarungsohr ist bei dir eher leise. Dabei sagt das Gegenüber oft viel über sich selbst – Sorge, Stress, Unsicherheit. In der Pflege ist genau das der Schlüssel zu Bedürfnissen und Vertrauen.",
    "Appellohr": "Du hörst Appelle seltener heraus. Das schützt dich davor, jede Äußerung als Auftrag zu nehmen – aber prüfe gelegentlich: Wartet hier jemand tatsächlich auf eine konkrete Handlung von mir?"
  };

  const dominantLabel = dominantOhren.length > 1
    ? dominantOhren.join(" & ") + " (gleich stark)"
    : dominantOhren[0];

  const dominantBlock = dominantOhren
    .map(o => `<p><strong>Impuls (${o}):</strong> ${impulse[o]}</p>`)
    .join("");

  const stilleBlock = stilleOhren.length > 0
    ? `<div class="quiet-box">
         <h3>Dein leisestes Ohr: ${stilleOhren.join(" & ")}</h3>
         ${stilleOhren.map(o => `<p style="margin:4px 0;">${stilleImpulse[o]}</p>`).join("")}
         <p class="small muted" style="margin-top:8px;">Hier liegt dein Entwicklungspotenzial: Das Ohr, das du am seltensten nutzt, trainierst du am stärksten, wenn du es bewusst aktivierst.</p>
       </div>`
    : "";

  resultEl.innerHTML = `
    <h2>Dein Ergebnis</h2>
    <p>Dein aktuell dominantes Ohr: <strong>${dominantLabel}</strong></p>
    <div class="badges">
      <span class="badge">Sachohr: ${votes["Sachohr"]} (${perc(votes["Sachohr"])}%)</span>
      <span class="badge">Beziehungsohr: ${votes["Beziehungsohr"]} (${perc(votes["Beziehungsohr"])}%)</span>
      <span class="badge">Selbstoffenbarungsohr: ${votes["Selbstoffenbarungsohr"]} (${perc(votes["Selbstoffenbarungsohr"])}%)</span>
      <span class="badge">Appellohr: ${votes["Appellohr"]} (${perc(votes["Appellohr"])}%)</span>
    </div>
    ${dominantBlock}
    ${stilleBlock}

    <div class="note-box">
      <h3>Grenzen des Modells</h3>
      <p style="margin:0 0 6px 0; font-size:14px;">Das 4-Ohren-Modell nach Schulz von Thun ist ein nützliches <em>Reflexionswerkzeug</em>, aber eine Vereinfachung der Realität:</p>
      <ul style="margin:0; padding-left:20px; font-size:14px;">
        <li>Reale Kommunikation spricht meist mehrere Ohren gleichzeitig an.</li>
        <li>Kontext, Beziehung und Situation beeinflussen das Hören stark – du „hörst" nicht immer gleich.</li>
        <li>Im Pflegealltag kommen sprachliche, kulturelle und gesundheitliche Besonderheiten hinzu (z. B. bei Demenz, Schmerz, Angst oder fremder Muttersprache).</li>
        <li>Das Modell ersetzt keine Kommunikationsschulung – es ordnet und macht bewusst.</li>
      </ul>
    </div>

    <p class="small muted" style="margin-top:12px;"><strong>Hinweis:</strong> Dieser Selbsttest ist eine Reflexionshilfe, kein diagnostischer Test. Je nach Situation und Stimmung kann dein „Hören" variieren.</p>

    <div class="controls" style="margin-top:16px;">
      <button class="secondary" type="button" id="btnRestart">Test neu starten</button>
    </div>
  `;
  resultEl.style.display = "block";
  resultEl.scrollIntoView({ behavior:"smooth", block:"start" });

  document.getElementById("btnRestart").addEventListener("click", () => {
    location.reload();
  });
});

// Initial render
render();

/* QR Code */
const qrFab      = document.getElementById('qrFab');
const qrBackdrop = document.getElementById('qrBackdrop');
const qrClose    = document.getElementById('qrClose');
const qrCanvas   = document.getElementById('qrCanvas');

let qrMade = false;
function openQR(){
  qrBackdrop.style.display = 'flex';
  if(!qrMade && typeof QRCode !== 'undefined'){
    new QRCode(qrCanvas, { text: window.location.href, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.H });
    qrMade = true;
  }
}
function closeQR(){ qrBackdrop.style.display = 'none'; }

qrFab.addEventListener('click', openQR);
qrClose.addEventListener('click', closeQR);
qrBackdrop.addEventListener('click', (e)=>{ if(e.target === qrBackdrop) closeQR(); });
window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeQR(); });

// QR-Button ausblenden, wenn Bibliothek nicht lädt
window.addEventListener('load', () => {
  if(typeof QRCode === 'undefined') qrFab.style.display = 'none';
});
</script>
